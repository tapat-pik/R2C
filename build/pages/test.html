<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@heroicons/v2/24/solid/index.js"></script>
</head>
<body class="bg-gray-50 p-8">

<div class="max-w-7xl mx-auto bg-white p-6 rounded-xl border border-gray-200">
    <div class="mb-6">
        <p class="text-sm text-gray-500">Dashboard > Orders</p>
        <h1 class="text-2xl font-bold text-gray-900 mt-1">Orders</h1>
        <p class="text-sm text-gray-500">Manage and track all customer orders.</p>
    </div>

    <div class="flex justify-between items-center mb-6">
        <div class="inline-flex bg-gray-100 p-1 rounded-full">
            <button class="bg-white px-6 py-1.5 rounded-full shadow-sm text-sm font-medium">All</button>
            <button class="px-6 py-1.5 text-gray-600 text-sm">Completed</button>
            <button class="px-6 py-1.5 text-gray-600 text-sm">Processing</button>
            <button class="px-6 py-1.5 text-gray-600 text-sm">Pending</button>
            <button class="px-6 py-1.5 text-gray-600 text-sm">Cancelled</button>
        </div>
        <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700">+ New Order</button>
    </div>

    <div class="flex justify-between items-center mb-4">
        <input type="text" placeholder="Search orders..." class="border border-gray-300 px-4 py-2 rounded-lg w-72 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <div class="flex gap-2">
            <button class="border px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2">Columns</button>
            <button class="border px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2">Export</button>
        </div>
    </div>

    <div class="border rounded-lg overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-gray-50 border-b">
                <tr class="text-xs font-semibold text-gray-500 uppercase">
                    <th class="p-4"><input type="checkbox"></th>
                    <th class="p-4 cursor-pointer hover:text-gray-800">Order ↕</th>
                    <th class="p-4 cursor-pointer hover:text-gray-800">Customer ↕</th>
                    <th class="p-4 cursor-pointer hover:text-gray-800">Product ↕</th>
                    <th class="p-4 cursor-pointer hover:text-gray-800">Status ↕</th>
                    <th class="p-4 cursor-pointer hover:text-gray-800">Date ↕</th>
                    <th class="p-4">Trend</th>
                    <th class="p-4 cursor-pointer hover:text-gray-800">Amount ↕</th>
                    <th class="p-4"></th>
                </tr>
            </thead>
            <tbody class="divide-y text-sm">
                <tr class="hover:bg-gray-50">
                    <td class="p-4"><input type="checkbox"></td>
                    <td class="p-4 font-medium">ORD-7891</td>
                    <td class="p-4 flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-purple-200 flex items-center justify-center text-purple-700 font-bold text-xs">EW</div>
                        <div><div>Emma Wilson</div><div class="text-gray-400">emma@example.com</div></div>
                    </td>
                    <td class="p-4">Pro Dashboard License</td>
                    <td class="p-4"><span class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-xs">Completed</span></td>
                    <td class="p-4">Feb 14, 2026</td>
                    <td class="p-4"><svg class="w-16 h-6 text-green-500" viewBox="0 0 50 15"><path d="M0 10 L15 8 L30 5 L50 2" fill="none" stroke="currentColor" stroke-width="2"/></svg></td>
                    <td class="p-4 font-semibold">$299.00</td>
                    <td class="p-4 text-gray-400">...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="flex justify-between items-center mt-6 py-4 text-sm">
        <div class="text-gray-500">Showing 1-10 of 20 results</div>
        <div class="flex items-center gap-2">
            <span class="text-gray-600">Rows</span>
            <select class="border rounded-lg px-2 py-1"><option>10</option></select>
            <button class="border px-4 py-2 rounded-lg text-gray-400 cursor-not-allowed">Previous</button>
            <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg">1</button>
            <button class="border px-4 py-2 rounded-lg">2</button>
            <button class="border px-4 py-2 rounded-lg">Next</button>
        </div>
    </div>
</div>

</body>
</html>
